name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  shell-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install zsh
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh

      - name: Run test suite
        run: |
          set -euxo pipefail
          ./tests/run.sh
